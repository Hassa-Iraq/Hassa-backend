events {
    worker_connections 1024;
}

http {
    # Increase max body size for file uploads (6MB to allow 5MB files with some buffer)
    client_max_body_size 6M;

    upstream auth-service {
        server auth-service:3001;
    }

    upstream restaurant-service {
        server restaurant-service:3002;
    }

    upstream order-service {
        server order-service:3003;
    }

    upstream delivery-service {
        server delivery-service:3004;
    }

    upstream payment-service {
        server payment-service:3005;
    }

    upstream notification-service {
        server notification-service:3006;
    }

    upstream admin-analytics-service {
        server admin-analytics-service:3007;
    }

    server {
        listen 80;
        server_name localhost;

        # CORS Headers - Handle at gateway level (applied to all locations)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, Accept, Origin' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

        # Root route - Service Health Dashboard
        location = / {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        # Auth Service - Health endpoint (specific match before general /api/auth/)
        location = /api/auth/health {
            proxy_pass http://auth-service/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Swagger UI Documentation Routes (prefix matches to handle static assets)
        location ^~ /api/auth/api-docs/ {
            proxy_pass http://auth-service/api-docs/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location = /api/auth/api-docs {
            return 301 /api/auth/api-docs/;
        }

        location ^~ /api/restaurants/api-docs/ {
            proxy_pass http://restaurant-service/api-docs/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location = /api/restaurants/api-docs {
            return 301 /api/restaurants/api-docs/;
        }

        location ^~ /api/orders/api-docs/ {
            proxy_pass http://order-service/api-docs/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location = /api/orders/api-docs {
            return 301 /api/orders/api-docs/;
        }

        location ^~ /api/deliveries/api-docs/ {
            proxy_pass http://delivery-service/api-docs/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location = /api/deliveries/api-docs {
            return 301 /api/deliveries/api-docs/;
        }

        location ^~ /api/payments/api-docs/ {
            proxy_pass http://payment-service/api-docs/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location = /api/payments/api-docs {
            return 301 /api/payments/api-docs/;
        }

        location ^~ /api/notifications/api-docs/ {
            proxy_pass http://notification-service/api-docs/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location = /api/notifications/api-docs {
            return 301 /api/notifications/api-docs/;
        }

        location ^~ /api/admin/api-docs/ {
            proxy_pass http://admin-analytics-service/api-docs/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location = /api/admin/api-docs {
            return 301 /api/admin/api-docs/;
        }

        # Auth Service - General routes
        # This must come after specific routes like /api/auth/health and /api/auth/api-docs
        # Match all /api/auth/* routes (except health and api-docs which are handled above)
        # Exclude api-docs explicitly to prevent regex from catching it
        location ~ ^/api/auth/(?!health$|api-docs$)(.+)$ {
            # Handle OPTIONS preflight requests
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, Accept, Origin' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            
            # Capture path after /api/auth/ and proxy to /auth/{path}
            # /api/auth/register -> /auth/register
            # /api/auth/login -> /auth/login
            proxy_pass http://auth-service/auth/$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Restaurant Service
        location /api/restaurants/ {
            client_max_body_size 6M;
            proxy_pass http://restaurant-service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Order Service
        location /api/orders/ {
            proxy_pass http://order-service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Delivery Service
        location /api/deliveries/ {
            proxy_pass http://delivery-service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Payment Service
        location /api/payments/ {
            proxy_pass http://payment-service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Notification Service
        location /api/notifications/ {
            proxy_pass http://notification-service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin Analytics Service
        location /api/admin/ {
            proxy_pass http://admin-analytics-service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Profile pictures (auth service) - must be more specific than /uploads/
        location /uploads/profile/ {
            proxy_pass http://auth-service/uploads/profile/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Other uploaded files (restaurant service: banners, etc.)
        location /uploads/ {
            proxy_pass http://restaurant-service/uploads/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
