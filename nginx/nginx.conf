events {
    worker_connections 1024;
}

http {
    client_max_body_size 6M;
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream auth-service {
        server auth-service:3001;
    }

    upstream restaurant-service {
        server restaurant-service:3002;
    }

    upstream order-service {
        server order-service:3003;
    }

    upstream delivery-service {
        server delivery-service:3004;
    }

    upstream payment-service {
        server payment-service:3005;
    }

    upstream notification-service {
        server notification-service:3006;
    }

    upstream admin-analytics-service {
        server admin-analytics-service:3007;
    }

    server {
        listen 80;
        server_name localhost;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, Accept, Origin' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

        location = / {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        location = /api/auth/health {
            set $auth_upstream "http://auth-service:3001";
            proxy_pass $auth_upstream/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/api/auth/(?!health$)(.+)$ {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, Accept, Origin' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
            set $auth_upstream "http://auth-service:3001";
            proxy_pass $auth_upstream/auth/$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/restaurants/ {
            client_max_body_size 6M;
            set $restaurant_upstream "http://restaurant-service:3002";
            rewrite ^/api/restaurants/(.*)$ /$1 break;
            proxy_pass $restaurant_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/orders/ {
            set $order_upstream "http://order-service:3003";
            rewrite ^/api/orders/(.*)$ /$1 break;
            proxy_pass $order_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/deliveries/ {
            set $delivery_upstream "http://delivery-service:3004";
            rewrite ^/api/deliveries/(.*)$ /$1 break;
            proxy_pass $delivery_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/payments/ {
            set $payment_upstream "http://payment-service:3005";
            rewrite ^/api/payments/(.*)$ /$1 break;
            proxy_pass $payment_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/notifications/ {
            set $notification_upstream "http://notification-service:3006";
            rewrite ^/api/notifications/(.*)$ /$1 break;
            proxy_pass $notification_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/admin/ {
            set $admin_upstream "http://admin-analytics-service:3007";
            rewrite ^/api/admin/(.*)$ /$1 break;
            proxy_pass $admin_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /uploads/profile/ {
            set $auth_upstream "http://auth-service:3001";
            proxy_pass $auth_upstream/uploads/profile/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /uploads/ {
            set $restaurant_upstream "http://restaurant-service:3002";
            proxy_pass $restaurant_upstream/uploads/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
