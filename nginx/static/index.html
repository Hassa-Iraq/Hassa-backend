<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food App — Health Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Nunito", system-ui, sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      padding: 24px;
      color: #1d1d1f;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 32px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      color: #1d1d1f;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 0.9375rem;
      color: #6e6e73;
      margin-top: 4px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    @media (max-width: 768px) {
      .stats-row {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .stat-card {
      background: #fff;
      border: 1px solid #e5e5ea;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: #1d1d1f;
    }

    .stat-value.healthy {
      color: #34c759;
    }

    .stat-value.unhealthy {
      color: #ff3b30;
    }

    .stat-label {
      font-size: 0.8125rem;
      color: #6e6e73;
      margin-top: 4px;
    }

    .refresh-row {
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .refresh-icon {
      width: 40px;
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #007aff;
      background: transparent;
      border: 1px solid #e5e5ea;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .refresh-icon:hover {
      background: #f0f0f5;
      border-color: #007aff;
    }

    .refresh-icon svg {
      width: 18px;
      height: 18px;
    }

    .refresh-icon.spinning svg {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .service-card {
      background: #fff;
      border: 1px solid #e5e5ea;
      border-radius: 12px;
      padding: 20px;
      transition: border-color 0.15s;
    }

    .service-card:hover {
      border-color: #d1d1d6;
    }

    .service-card.clickable {
      cursor: pointer;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 24px;
    }

    .modal-overlay.hidden {
      display: none;
    }

    .modal {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e5e5ea;
      max-width: 480px;
      width: 100%;
      max-height: 80vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid #e5e5ea;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #1d1d1f;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: #6e6e73;
      cursor: pointer;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      line-height: 1;
    }

    .modal-close:hover {
      background: #f0f0f5;
      color: #1d1d1f;
    }

    .modal-body {
      padding: 16px 20px;
      overflow-y: auto;
    }

    .endpoint-list {
      list-style: none;
    }

    .endpoint-list li {
      font-size: 0.8125rem;
      font-family: ui-monospace, monospace;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f5;
      color: #1d1d1f;
    }

    .endpoint-list li:last-child {
      border-bottom: none;
    }

    .endpoint-method {
      display: inline-block;
      min-width: 52px;
      font-weight: 600;
    }

    .endpoint-method.get {
      color: #34c759;
    }

    .endpoint-method.post {
      color: #007aff;
    }

    .endpoint-method.put {
      color: #ff9500;
    }

    .endpoint-method.patch {
      color: #ff9500;
    }

    .endpoint-method.delete {
      color: #ff3b30;
    }

    .service-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .service-name {
      font-size: 0.9375rem;
      font-weight: 600;
      color: #1d1d1f;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-dot.healthy {
      background: #34c759;
    }

    .status-dot.unhealthy {
      background: #ff3b30;
    }

    .status-dot.checking {
      background: #ff9500;
    }

    .service-meta {
      font-size: 0.8125rem;
      color: #6e6e73;
      line-height: 1.5;
    }

    .service-meta div {
      margin-top: 4px;
    }

    .service-meta .error-msg {
      color: #ff3b30;
      margin-top: 8px;
    }

    .loading-msg {
      text-align: center;
      color: #6e6e73;
      font-size: 0.9375rem;
      padding: 48px 16px;
    }

    .last-update {
      font-size: 0.75rem;
      color: #8e8e93;
      margin-top: 24px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>Food App</h1>
      <p class="subtitle">Service health dashboard</p>
    </header>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="total-services">—</div>
        <div class="stat-label">Total services</div>
      </div>
      <div class="stat-card">
        <div class="stat-value healthy" id="healthy-services">—</div>
        <div class="stat-label">Healthy</div>
      </div>
      <div class="stat-card">
        <div class="stat-value unhealthy" id="unhealthy-services">—</div>
        <div class="stat-label">Unhealthy</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="uptime-pct">—</div>
        <div class="stat-label">Uptime %</div>
      </div>
    </div>

    <div class="refresh-row">
      <button class="refresh-icon" type="button" onclick="refreshClicked()" title="Refresh status" id="refresh-btn">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
      </button>
    </div>

    <div class="services-grid" id="services-grid">
      <div class="loading-msg">Loading service status…</div>
    </div>

    <p class="last-update" id="last-update"></p>
  </div>

  <div class="modal-overlay hidden" id="endpoints-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">API endpoints</h2>
        <button type="button" class="modal-close" onclick="closeEndpointsModal()" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <ul class="endpoint-list" id="endpoint-list"></ul>
      </div>
    </div>
  </div>

  <script>
    const services = [
      { name: "Auth", path: "/api/auth/health", id: "auth-service" },
      { name: "Restaurant", path: "/api/restaurants/health", id: "restaurant-service" },
      { name: "Order", path: "/api/orders/health", id: "order-service" },
      { name: "Delivery", path: "/api/deliveries/health", id: "delivery-service" },
      { name: "Payment", path: "/api/payments/health", id: "payment-service" },
      { name: "Notification", path: "/api/notifications/health", id: "notification-service" },
      { name: "Admin Analytics", path: "/api/admin/health", id: "admin-analytics-service" },
    ];

    const SERVICE_ENDPOINTS = {
      "auth-service": [
        { method: "GET", path: "/api/auth/health" },
        { method: "POST", path: "/api/auth/register" },
        { method: "POST", path: "/api/auth/login" },
        { method: "POST", path: "/api/auth/login/phone" },
        { method: "POST", path: "/api/auth/validate" },
        { method: "GET", path: "/api/auth/me" },
        { method: "POST", path: "/api/auth/logout" },
        { method: "PUT", path: "/api/auth/change-password" },
        { method: "POST", path: "/api/auth/forgot-password" },
        { method: "POST", path: "/api/auth/reset-password" },
        { method: "POST", path: "/api/auth/forgot-password-phone" },
        { method: "POST", path: "/api/auth/reset-password-phone" },
        { method: "POST", path: "/api/auth/signup/phone/request-otp" },
        { method: "POST", path: "/api/auth/signup/phone/verify-otp" },
        { method: "POST", path: "/api/auth/signup/email/request-otp" },
        { method: "POST", path: "/api/auth/signup/email/verify-otp" },
        { method: "POST", path: "/api/auth/forgot-password-otp" },
        { method: "POST", path: "/api/auth/reset-password-otp" },
        { method: "PUT", path: "/api/auth/profile" },
        { method: "POST", path: "/api/auth/admin/create-admin" },
      ],
      "restaurant-service": [
        { method: "GET", path: "/api/restaurants/health" },
        { method: "POST", path: "/api/restaurants/restaurants" },
        { method: "GET", path: "/api/restaurants/restaurants" },
        { method: "GET", path: "/api/restaurants/restaurants/:id" },
        { method: "PUT", path: "/api/restaurants/restaurants/:id" },
        { method: "PATCH", path: "/api/restaurants/restaurants/:id/approve" },
        { method: "PATCH", path: "/api/restaurants/restaurants/:id/block" },
        { method: "PATCH", path: "/api/restaurants/restaurants/:id/unblock" },
        { method: "PATCH", path: "/api/restaurants/restaurants/:id/open" },
        { method: "PATCH", path: "/api/restaurants/restaurants/:id/close" },
        { method: "POST", path: "/api/restaurants/menu-categories" },
        { method: "GET", path: "/api/restaurants/menu-categories" },
        { method: "GET", path: "/api/restaurants/menu-categories/:id" },
        { method: "PUT", path: "/api/restaurants/menu-categories/:id" },
        { method: "DELETE", path: "/api/restaurants/menu-categories/:id" },
        { method: "POST", path: "/api/restaurants/menu-items" },
        { method: "GET", path: "/api/restaurants/menu-items" },
        { method: "GET", path: "/api/restaurants/menu-items/:id" },
        { method: "PUT", path: "/api/restaurants/menu-items/:id" },
        { method: "DELETE", path: "/api/restaurants/menu-items/:id" },
        { method: "GET", path: "/api/restaurants/discover/restaurants" },
        { method: "GET", path: "/api/restaurants/discover/restaurants/:id" },
        { method: "GET", path: "/api/restaurants/discover/restaurants/:id/menu" },
        { method: "GET", path: "/api/restaurants/search/restaurants" },
        { method: "GET", path: "/api/restaurants/search/menu-items" },
        { method: "POST", path: "/api/restaurants/banners" },
        { method: "GET", path: "/api/restaurants/banners" },
        { method: "GET", path: "/api/restaurants/banners/:id" },
        { method: "POST", path: "/api/restaurants/banners/:id/accept" },
        { method: "POST", path: "/api/restaurants/banners/:id/reject" },
        { method: "GET", path: "/api/restaurants/public/banners" },
      ],
      "order-service": [
        { method: "GET", path: "/api/orders/health" },
      ],
      "delivery-service": [
        { method: "GET", path: "/api/deliveries/health" },
      ],
      "payment-service": [
        { method: "GET", path: "/api/payments/health" },
      ],
      "notification-service": [
        { method: "GET", path: "/api/notifications/health" },
        { method: "POST", path: "/api/notifications/notifications/send-email" },
        { method: "POST", path: "/api/notifications/notifications/send-sms" },
      ],
      "admin-analytics-service": [
        { method: "GET", path: "/api/admin/health" },
        { method: "POST", path: "/api/admin/coupons" },
        { method: "GET", path: "/api/admin/coupons" },
        { method: "GET", path: "/api/admin/coupons/:id" },
        { method: "PUT", path: "/api/admin/coupons/:id" },
        { method: "DELETE", path: "/api/admin/coupons/:id" },
        { method: "GET", path: "/api/admin/banners" },
        { method: "GET", path: "/api/admin/banners/:id" },
        { method: "PATCH", path: "/api/admin/banners/:id/quote" },
        { method: "PATCH", path: "/api/admin/banners/:id/public" },
        { method: "PATCH", path: "/api/admin/banners/:id/unpublic" },
      ],
    };

    async function checkServiceHealth(service) {
      try {
        const response = await fetch(service.path);
        const data = await response.json();
        const isHealthy = response.ok && data.success && data.data?.status === "healthy";
        return {
          ...service,
          status: isHealthy ? "healthy" : "unhealthy",
          data: data.data || {},
          error: null,
        };
      } catch (err) {
        return {
          ...service,
          status: "unhealthy",
          data: null,
          error: err.message || "Unavailable",
        };
      }
    }

    function renderCard(serviceInfo) {
      const card = document.createElement("div");
      card.className = "service-card clickable";
      card.dataset.serviceId = serviceInfo.id;
      card.dataset.serviceName = serviceInfo.name;
      const statusClass = serviceInfo.status === "healthy" ? "healthy" : serviceInfo.status === "checking" ? "checking" : "unhealthy";
      const statusLabel = serviceInfo.status === "healthy" ? "Healthy" : serviceInfo.status === "unhealthy" ? "Unhealthy" : "Checking";
      const db = serviceInfo.data?.database ? `DB: ${serviceInfo.data.database}` : "";
      const ts = serviceInfo.data?.timestamp
        ? `Checked: ${new Date(serviceInfo.data.timestamp).toLocaleTimeString()}`
        : "";
      const err = serviceInfo.error ? `<div class="error-msg">${serviceInfo.error}</div>` : "";
      card.innerHTML = `
        <div class="service-header">
          <span class="service-name">${serviceInfo.name}</span>
          <span class="status-dot ${statusClass}" title="${statusLabel}"></span>
        </div>
        <div class="service-meta">
          ${db ? `<div>${db}</div>` : ""}
          ${ts ? `<div>${ts}</div>` : ""}
          ${err}
        </div>
      `;
      card.addEventListener("click", function () {
        openEndpointsModal(serviceInfo.id, serviceInfo.name);
      });
      return card;
    }

    function refreshClicked() {
      const btn = document.getElementById("refresh-btn");
      if (btn) btn.classList.add("spinning");
      checkAllServices().then(function () {
        if (btn) btn.classList.remove("spinning");
      });
    }

    function openEndpointsModal(serviceId, serviceName) {
      const list = document.getElementById("endpoint-list");
      const title = document.getElementById("modal-title");
      const modal = document.getElementById("endpoints-modal");
      const endpoints = SERVICE_ENDPOINTS[serviceId] || [];
      title.textContent = serviceName + " — API endpoints";
      list.innerHTML = endpoints.length
        ? endpoints.map(function (e) {
          return "<li><span class=\"endpoint-method " + e.method.toLowerCase() + "\">" + e.method + "</span> " + e.path + "</li>";
        }).join("")
        : "<li>No endpoints listed.</li>";
      modal.classList.remove("hidden");
    }

    function closeEndpointsModal() {
      document.getElementById("endpoints-modal").classList.add("hidden");
    }

    function updateSummary(results) {
      const total = results.length;
      const healthy = results.filter((s) => s.status === "healthy").length;
      const unhealthy = total - healthy;
      const pct = total ? Math.round((healthy / total) * 100) : 0;

      document.getElementById("total-services").textContent = total;
      document.getElementById("healthy-services").textContent = healthy;
      document.getElementById("unhealthy-services").textContent = unhealthy;
      document.getElementById("uptime-pct").textContent = pct + "%";
      document.getElementById("last-update").textContent =
        "Last updated: " + new Date().toLocaleString();
    }

    async function checkAllServices() {
      const grid = document.getElementById("services-grid");
      grid.innerHTML = "";

      services.forEach((s) => {
        const info = { ...s, status: "checking", data: null, error: null };
        grid.appendChild(renderCard(info));
      });

      const results = await Promise.all(services.map(checkServiceHealth));
      grid.innerHTML = "";
      results.forEach((r) => grid.appendChild(renderCard(r)));
      updateSummary(results);
    }

    checkAllServices();

    document.getElementById("endpoints-modal").addEventListener("click", function (e) {
      if (e.target === this) closeEndpointsModal();
    });
  </script>
</body>

</html>
