services:
  # PostgreSQL Database
  # Note: Default host port is 5433 to avoid conflicts with local PostgreSQL on 5432
  # Set POSTGRES_PORT=5432 only if you've stopped your local PostgreSQL instance
  postgres:
    image: postgres:15-alpine
    container_name: food-app-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hassa}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - food-app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: food-app-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - food-app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: food-app-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - food-app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Auth Service
  # Note: Image name will be automatically replaced during deployment by CI/CD pipeline
  auth-service:
    build:
      context: .
      dockerfile: ./services/auth-service/Dockerfile
    container_name: food-app-auth-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${AUTH_SERVICE_PORT:-3001}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-hassa}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SERVICE_NAME: auth-service
      USE_DEV_OTP: ${USE_DEV_OTP:-0}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://notification-service:3006}
    ports:
      - "${AUTH_SERVICE_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - auth_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - food-app-network
    restart: unless-stopped

  # Restaurant Service
  restaurant-service:
    build:
      context: .
      dockerfile: ./services/restaurant-service/Dockerfile
    container_name: food-app-restaurant-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${RESTAURANT_SERVICE_PORT:-3002}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-hassa}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:3001}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SERVICE_NAME: restaurant-service
    ports:
      - "${RESTAURANT_SERVICE_PORT:-3002}:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    volumes:
      - restaurant_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3002/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - food-app-network
    restart: unless-stopped

  # Order Service
  order-service:
    build:
      context: .
      dockerfile: ./services/order-service/Dockerfile
    container_name: food-app-order-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${ORDER_SERVICE_PORT:-3003}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-hassa}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:3001}
      RESTAURANT_SERVICE_URL: ${RESTAURANT_SERVICE_URL:-http://restaurant-service:3002}
      DELIVERY_SERVICE_URL: ${DELIVERY_SERVICE_URL:-http://delivery-service:3004}
      WALLET_SERVICE_URL: ${WALLET_SERVICE_URL:-http://wallet-service:3009}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SERVICE_NAME: order-service
    ports:
      - "${ORDER_SERVICE_PORT:-3003}:3003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      wallet-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3003/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - food-app-network
    restart: unless-stopped

  # Delivery Service
  delivery-service:
    build:
      context: .
      dockerfile: ./services/delivery-service/Dockerfile
    container_name: food-app-delivery-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${DELIVERY_SERVICE_PORT:-3004}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-hassa}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:3001}
      ORDER_SERVICE_URL: ${ORDER_SERVICE_URL:-http://order-service:3003}
      RESTAURANT_SERVICE_URL: ${RESTAURANT_SERVICE_URL:-http://restaurant-service:3002}
      WALLET_SERVICE_URL: ${WALLET_SERVICE_URL:-http://wallet-service:3009}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      PLATFORM_COMMISSION_RATE: ${PLATFORM_COMMISSION_RATE:-0.15}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SERVICE_NAME: delivery-service
    ports:
      - "${DELIVERY_SERVICE_PORT:-3004}:3004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      wallet-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3004/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - food-app-network
    restart: unless-stopped

  # Payment Service
  payment-service:
    build:
      context: .
      dockerfile: ./services/payment-service/Dockerfile
    container_name: food-app-payment-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PAYMENT_SERVICE_PORT:-3005}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-hassa}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:3001}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SERVICE_NAME: payment-service
    ports:
      - "${PAYMENT_SERVICE_PORT:-3005}:3005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3005/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - food-app-network
    restart: unless-stopped

  # Notification Service
  notification-service:
    build:
      context: .
      dockerfile: ./services/notification-service/Dockerfile
    container_name: food-app-notification-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${NOTIFICATION_SERVICE_PORT:-3006}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-hassa}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:3001}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SERVICE_NAME: notification-service
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_FROM: ${SMTP_FROM:-}
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-3006}:3006"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3006/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - food-app-network
    restart: unless-stopped

  # Admin Analytics Service
  admin-analytics-service:
    build:
      context: .
      dockerfile: ./services/admin-analytics-service/Dockerfile
    container_name: food-app-admin-analytics-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${ADMIN_ANALYTICS_SERVICE_PORT:-3007}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-hassa}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:3001}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SERVICE_NAME: admin-analytics-service
    ports:
      - "${ADMIN_ANALYTICS_SERVICE_PORT:-3007}:3007"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3007/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - food-app-network
    restart: unless-stopped

  # Wallet Service
  wallet-service:
    build:
      context: .
      dockerfile: ./services/wallet-service/Dockerfile
    container_name: food-app-wallet-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${WALLET_SERVICE_PORT:-3009}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-hassa}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:3001}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      PLATFORM_COMMISSION_RATE: ${PLATFORM_COMMISSION_RATE:-0.15}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SERVICE_NAME: wallet-service
    ports:
      - "${WALLET_SERVICE_PORT:-3009}:3009"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3009/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - food-app-network
    restart: unless-stopped

  # Nginx API Gateway
  nginx:
    image: nginx:1.24-alpine
    container_name: food-app-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/static:/usr/share/nginx/html:ro
    depends_on:
      auth-service:
        condition: service_healthy
      restaurant-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      delivery-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      admin-analytics-service:
        condition: service_healthy
      wallet-service:
        condition: service_healthy
    networks:
      - food-app-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  auth_uploads:
  restaurant_uploads:

networks:
  food-app-network:
    driver: bridge
